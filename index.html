<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Clicker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ===== ヘッダー ===== -->
  <header id="header">
    <h1>🗺️ TRAVEL CLICKER</h1>
    <div id="header-stats">
      <div class="hstat">👥 <span id="follower-val">0</span></div>
      <div class="hstat">💰 <span id="money-val">0円</span></div>
      <div class="hstat">💸 <span id="income-val">0円/秒</span></div>
      <div class="hstat">⚡ <span id="speed-val">0m/s</span></div>
    </div>
    <button class="header-btn" onclick="saveGame()">💾 セーブ</button>
  </header>

  <!-- ===== メイン（左） ===== -->
  <main id="main">

    <!-- シーン -->
    <div id="scene-wrap">
      <canvas id="scene-canvas"></canvas>
      <div id="milestone-notif"></div>
      <button id="walk-btn" onclick="onWalkBtn()" title="クリック/タップで前進">
        🚶 歩く
      </button>
    </div>

    <!-- ステータスバー -->
    <div id="status-bar">
      <div class="status-block">
        <div class="status-label">📍 現在地</div>
        <div class="status-value" id="cur-loc">自宅の庭</div>
        <div class="status-sub">総移動距離: <span id="total-dist">0m</span></div>
      </div>
      <div class="status-block">
        <div class="status-label">🎯 次のショップ</div>
        <div class="status-value" id="nxt-loc">コンビニ</div>
        <div class="status-sub" id="nxt-dist">30m 先</div>
      </div>
    </div>

    <!-- プログレスバー -->
    <div id="progress-wrap">
      <span id="progress-label">▶</span>
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
      <span id="progress-nxt">次へ</span>
    </div>

    <!-- 旅の記録 -->
    <div id="log-wrap">
      <div id="log-title">📜 旅の記録</div>
      <ul id="log-list"></ul>
    </div>

  </main>

  <!-- ===== ショップ（右） ===== -->
  <aside id="shop">
    <div id="shop-tabs">
      <button class="tab-btn active" data-tab="sponsor" onclick="setTab('sponsor')">🤝 スポンサー</button>
      <button class="tab-btn" data-tab="vehicle"  onclick="setTab('vehicle')">🚗 乗り物</button>
      <button class="tab-btn" data-tab="camera"   onclick="setTab('camera')">📸 カメラ</button>
    </div>
    <div id="shop-items"></div>
  </aside>

</div>

<script src="js/data.js"></script>
<script src="js/game.js"></script>
</body>
</html>
