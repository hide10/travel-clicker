<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Clicker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ===== ヘッダー ===== -->
  <header id="header">
    <h1>🗺️ TRAVEL CLICKER</h1>
    <div id="header-right">
      <button class="header-btn" onclick="saveGame()">💾 セーブ</button>
    </div>
  </header>

  <!-- ===== メイン（左カラム） ===== -->
  <main id="main">

    <!-- シーン（キャンバス） -->
    <div id="scene-wrap">
      <canvas id="scene-canvas"></canvas>
      <div id="milestone-notif"></div>
    </div>

    <!-- ステータスバー -->
    <div id="status-bar">
      <div class="status-block">
        <div class="status-label">📍 現在地</div>
        <div class="status-value" id="cur-loc">自宅の庭</div>
        <div class="status-sub">総移動距離: <span id="total-dist">0 m</span></div>
      </div>
      <div class="status-block">
        <div class="status-label">🎯 次のショップ</div>
        <div class="status-value" id="nxt-loc">近所の公園</div>
        <div class="status-sub" id="nxt-dist">500 m 先</div>
      </div>
    </div>

    <!-- プログレスバー -->
    <div id="progress-wrap">
      <span id="progress-label">▶</span>
      <div id="progress-track">
        <div id="progress-fill"></div>
      </div>
      <span id="progress-nxt">次へ</span>
    </div>

    <!-- 旅の記録 -->
    <div id="log-wrap">
      <div id="log-title">📜 旅の記録</div>
      <ul id="log-list"></ul>
    </div>

  </main>

  <!-- ===== ショップ（右カラム） ===== -->
  <aside id="shop">
    <div id="shop-header">
      <div id="shop-title">🛒 ショップ</div>
      <div id="shop-stats">
        💰 <span id="coin-val">0 m</span><br>
        ⚡ <span id="speed-val">0 m/s</span>
      </div>
    </div>
    <div id="shop-items">
      <!-- JS が動的に生成 -->
    </div>
  </aside>

</div><!-- #app -->

<script src="js/data.js"></script>
<script src="js/game.js"></script>
</body>
</html>
